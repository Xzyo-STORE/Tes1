<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XZYO STORE | Lobby</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo-desktop">XZYO<span>STORE</span></div>
            
            <div class="mobile-header">
                <div class="nav-mob-left">
                    <div class="logo-circle">XZ</div>
                    <span>STORE</span>
                </div>
                <div class="nav-mob-right">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <i class="fa-solid fa-bars" id="btnMenu"></i>
                </div>
            </div>

            <div class="nav-menu">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="Cari Game...">
                </div>
                <a href="#">HOME</a>
                <a href="#">CEK TRANSAKSI</a>
                <a href="#" class="btn-login">MASUK</a>
            </div>
        </div>
    </nav>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span>MENU</span>
            <i class="fa-solid fa-xmark" id="btnClose"></i>
        </div>
        <div class="sidebar-links">
            <a href="#"><i class="fa-solid fa-house"></i> HOME</a>
            <a href="#"><i class="fa-solid fa-receipt"></i> CEK TRANSAKSI</a>
            <a href="#"><i class="fa-solid fa-headset"></i> CHAT ADMIN</a>
        </div>
    </div>

    <main class="lobby-container">
        
        <section class="banner">
            <div class="slider-wrapper">
                <div class="arrow-left">&lt;</div>
                <img src="https://via.placeholder.com/1200x400/0044ff/ffffff?text=PROMO+XZYO+STORE" alt="Banner">
                <div class="arrow-right">&gt;</div>
            </div>
        </section>

        <section class="game-section">
            <h2 class="section-title">BLOX FRUIT</h2>
            <div class="grid-3-col">
                <a href="LINK_WEB_JOKI_KAMU" class="card-item">
                    <img src="https://via.placeholder.com/150/1e293b/3b82f6?text=JOKI" alt="Joki">
                    <span>JOKI</span>
                </a>
                <a href="LINK_WEB_FRUIT_KAMU" class="card-item">
                    <img src="https://via.placeholder.com/150/1e293b/3b82f6?text=FRUIT" alt="Fruit">
                    <span>FRUIT</span>
                </a>
                <a href="LINK_WEB_GP_KAMU" class="card-item">
                    <img src="https://via.placeholder.com/150/1e293b/3b82f6?text=GP" alt="GAMEPASS">
                    <span>GAMEPASS</span>
                </a>
            </div>
        </section>

        <section class="game-section">
            <h2 class="section-title">TOP UP</h2>
            <div class="grid-3-col">
                <a href="#" class="card-item">
                    <img src="https://via.placeholder.com/150/1e293b/3b82f6?text=FF" alt="FF">
                    <span>FF</span>
                </a>
                <a href="#" class="card-item">
                    <img src="https://via.placeholder.com/150/1e293b/3b82f6?text=ML" alt="ML">
                    <span>ML</span>
                </a>
                <a href="#" class="card-item">
                    <img src="https://via.placeholder.com/150/1e293b/3b82f6?text=PUBG" alt="PUBG">
                    <span>PUBG</span>
                </a>
            </div>
        </section>

        <section class="game-section">
            <a href="#" class="card-item wide">
                <div class="flex-row">
                    <img src="https://via.placeholder.com/100/1e293b/3b82f6?text=RBX" alt="Roblox">
                    <span>ROBLOX</span>
                </div>
            </a>
        </section>

    </main>

    <script>
        const btnMenu = document.getElementById('btnMenu');
        const btnClose = document.getElementById('btnClose');
        const sidebar = document.getElementById('sidebar');

        btnMenu.onclick = () => sidebar.classList.add('active');
        btnClose.onclick = () => sidebar.classList.remove('active');
    </script>
</body>
            </html>
