<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XZYOSTORE | HOME</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="store-logo">
                <img src="logo-animasi-kamu.png" alt="XZYOSTORE">
            </div>

            <div class="nav-right">
                <div class="search-bar">
                    <input type="text" placeholder="Search...">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
                
                <div class="menu-desktop">
                    <a href="#">HOME</a>
                    <a href="#">CEK TRANSAKSI</a>
                    <a href="#">CHAT ADMIN</a>
                </div>

                <button id="menuBtn" class="hamburger">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </div>
        </div>
    </nav>

    <div id="sidebar" class="sidebar">
        <div class="sidebar-content">
            <button id="closeBtn"><i class="fa-solid fa-xmark"></i></button>
            <a href="#">HOME</a>
            <a href="#">CEK TRANSAKSI</a>
            <a href="#">CHAT ADMIN</a>
        </div>
    </div>

    <main class="container">
        
        <section class="banner-container">
            <div class="slider" id="mainSlider">
                <div class="slide bg-1"><span>BANNER 1</span></div>
                <div class="slide bg-2"><span>BANNER 2</span></div>
                <div class="slide bg-3"><span>BANNER 3</span></div>
                <div class="slide bg-4"><span>BANNER 4</span></div>
            </div>
            <div class="dots">
                <div class="dot active"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </section>

        <section class="category-section">
            <h2 class="category-title">BLOX FRUIT</h2>
            <div class="options-grid">
                <a href="#" class="option-card">
                    <div class="img-1x1"></div>
                    <span>JOKI</span>
                </a>
                <a href="#" class="option-card">
                    <div class="img-1x1"></div>
                    <span>FRUIT</span>
                </a>
                <a href="#" class="option-card">
                    <div class="img-1x1"></div>
                    <span>GAMEPASS</span>
                </a>
            </div>
        </section>

        <section class="category-section">
            <h2 class="category-title">TOP UP</h2>
            <div class="options-grid">
                <a href="#" class="option-card">
                    <div class="img-1x1"></div>
                    <span>FF</span>
                </a>
                <a href="#" class="option-card">
                    <div class="img-1x1"></div>
                    <span>ML</span>
                </a>
                <a href="#" class="option-card">
                    <div class="img-1x1"></div>
                    <span>PUBG</span>
                </a>
            </div>
        </section>

        <section class="category-section">
            <div class="options-grid single-row">
                <a href="#" class="option-card">
                    <div class="img-1x1"></div>
                    <span>ROBLOX</span>
                </a>
            </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
