<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XZYOSTORE | Lobby</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="store-logo">
                <img src="logo-kamu.png" alt="XZYOSTORE">
            </div>

            <div class="nav-right">
                <div class="search-bar">
                    <input type="text" placeholder="Search...">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
                
                <div class="menu-desktop">
                    <a href="#">HOME</a>
                    <a href="#">CEK TRANSAKSI</a>
                    <a href="#">CHAT ADMIN</a>
                </div>

                <button id="menuBtn" class="hamburger">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </div>
        </div>
    </nav>

    <div id="sidebar" class="sidebar">
        <div class="sidebar-content">
            <button id="closeBtn"><i class="fa-solid fa-xmark"></i></button>
            <a href="#">HOME</a>
            <a href="#">CEK TRANSAKSI</a>
            <a href="#">CHAT ADMIN</a>
        </div>
    </div>

    <main class="container">
        
        <section class="banner-grid">
            <div class="banner-box"><span>BANNER 1</span></div>
            <div class="banner-box"><span>BANNER 2</span></div>
            <div class="banner-box"><span>BANNER 3</span></div>
            <div class="banner-box"><span>BANNER 4</span></div>
        </section>

        <section class="category-section">
            <h2 class="category-title">BLOX FRUIT</h2>
            <div class="options-row">
                <a href="#" class="option-card">
                    <div class="img-placeholder"></div>
                    <span>JOKI</span>
                </a>
                <a href="#" class="option-card">
                    <div class="img-placeholder"></div>
                    <span>FRUIT</span>
                </a>
                <a href="#" class="option-card">
                    <div class="img-placeholder"></div>
                    <span>GAMEPASS</span>
                </a>
            </div>
        </section>

        <section class="category-section">
            <h2 class="category-title">TOP UP</h2>
            <div class="options-row">
                <a href="#" class="option-card">
                    <div class="img-placeholder"></div>
                    <span>FF</span>
                </a>
                <a href="#" class="option-card">
                    <div class="img-placeholder"></div>
                    <span>ML</span>
                </a>
                <a href="#" class="option-card">
                    <div class="img-placeholder"></div>
                    <span>PUBG</span>
                </a>
            </div>
        </section>

        <section class="category-section">
            <div class="options-row single">
                <a href="#" class="option-card">
                    <div class="img-placeholder"></div>
                    <span>ROBLOX</span>
                </a>
            </div>
        </section>

    </main>

    <script>
        const menuBtn = document.getElementById('menuBtn');
        const closeBtn = document.getElementById('closeBtn');
        const sidebar = document.getElementById('sidebar');

        menuBtn.onclick = () => sidebar.classList.add('active');
        closeBtn.onclick = () => sidebar.classList.remove('active');
    </script>
</body>
</html>
